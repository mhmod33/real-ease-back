@if (open && property) {
  <div class="epm-overlay" (click)="onCancel()">
    <div class="epm-box" (click)="$event.stopPropagation()" dir="rtl">

      <h3 class="epm-title">تعديل, <span class="epm-title-bold">العقار</span></h3>

      <form class="epm-form" (ngSubmit)="onSave()" #editForm="ngForm">
        <div class="epm-row">
          <div class="epm-field">
            <label class="epm-label">اسم العقار</label>
            <input class="epm-input" type="text" [(ngModel)]="draft.name" name="name" required />
          </div>
        </div>

        <div class="epm-row epm-row-2">
          <div class="epm-field">
            <label class="epm-label">نوع العقار</label>
            <select class="epm-input" [(ngModel)]="draft.type" name="type" required>
              @for (t of propertyTypes; track t) {
                <option [value]="t">{{ t }}</option>
              }
            </select>
          </div>

          <div class="epm-field">
            <label class="epm-label">حالة العقار</label>
            <select class="epm-input" [(ngModel)]="draft.status" name="status" required>
              @for (s of propertyStatuses; track s) {
                <option [value]="s">{{ s }}</option>
              }
            </select>
          </div>
        </div>

        <div class="epm-row epm-row-2">
          <div class="epm-field">
            <label class="epm-label">السعر</label>
            <input class="epm-input" type="number" [(ngModel)]="draft.priceNum" name="priceNum" required />
          </div>

          <div class="epm-field">
            <label class="epm-label">المدينة</label>
            <input class="epm-input" type="text" [(ngModel)]="draft.city" name="city" required />
          </div>
        </div>

        <div class="epm-row">
          <div class="epm-field">
            <label class="epm-label">رابط الصورة</label>
            <input class="epm-input" type="text" [(ngModel)]="draft.image" name="image" />
          </div>
        </div>

        <div class="epm-row">
          <div class="epm-field">
            <label class="epm-label">الوصف</label>
            <textarea class="epm-input epm-textarea" [(ngModel)]="draft.description" name="description" rows="4"></textarea>
          </div>
        </div>

        <div class="epm-actions">
          <button type="button" class="btn-epm-cancel" (click)="onCancel()">إلغاء</button>
          <button type="submit" class="btn-epm-save" [disabled]="editForm.invalid">حفظ</button>
        </div>
      </form>

    </div>
  </div>
}
