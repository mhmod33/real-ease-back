<main class="restore-page" dir="rtl">
  <div class="restore-card">
    <img class="restore-logo" src="/images/logo1.png" alt="RealEase" />

    <section class="restore-form-panel" aria-labelledby="restore-title">
      <div class="header">
        <h1 id="restore-title">استعادة كلمة المرور</h1>
      </div>

      <form class="restore-form">
        <label class="form-field" aria-label="كلمة المرور">
          <input
            [type]="showPassword() ? 'text' : 'password'"
            placeholder="كلمة المرور"
            autocomplete="new-password"
          />
          <span class="field-icon field-icon-right" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <rect x="5.5" y="10" width="13" height="10" rx="2" />
              <path d="M8.5 10V7.5a3.5 3.5 0 0 1 7 0V10" />
            </svg>
          </span>
          <button
            type="button"
            class="field-icon field-icon-left toggle-btn"
            (click)="togglePassword()"
            [attr.aria-label]="showPassword() ? 'إخفاء كلمة المرور' : 'إظهار كلمة المرور'"
          >
            @if (!showPassword()) {
              <svg viewBox="0 0 24 24">
                <path d="M2.4 12C3.6 7.5 7.4 4.2 12 4.2s8.4 3.3 9.6 7.8C20.4 16.5 16.6 19.8 12 19.8S3.6 16.5 2.4 12z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            }
            @if (showPassword()) {
              <svg viewBox="0 0 24 24">
                <path d="M10.6 10.7a2.1 2.1 0 0 0 2.7 2.7" />
                <path d="M8.4 5.4A10.8 10.8 0 0 1 12 4.8c5 0 8.2 4.4 9.2 6.2a1.9 1.9 0 0 1 0 2c-.4.7-1.3 2-2.6 3.2" />
                <path d="M15.6 18.6a10.6 10.6 0 0 1-3.6.6c-5 0-8.2-4.4-9.2-6.2a1.9 1.9 0 0 1 0-2c.4-.8 1.6-2.4 3.2-3.7" />
                <path d="M3 3l18 18" />
              </svg>
            }
          </button>
        </label>

        <label class="form-field" aria-label="تأكيد كلمة المرور">
          <input
            [type]="showConfirmPassword() ? 'text' : 'password'"
            placeholder="تأكيد كلمة المرور"
            autocomplete="new-password"
          />
          <span class="field-icon field-icon-right" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <rect x="5.5" y="10" width="13" height="10" rx="2" />
              <path d="M8.5 10V7.5a3.5 3.5 0 0 1 7 0V10" />
            </svg>
          </span>
          <button
            type="button"
            class="field-icon field-icon-left toggle-btn"
            (click)="toggleConfirmPassword()"
            [attr.aria-label]="showConfirmPassword() ? 'إخفاء كلمة المرور' : 'إظهار كلمة المرور'"
          >
            @if (!showConfirmPassword()) {
              <svg viewBox="0 0 24 24">
                <path d="M2.4 12C3.6 7.5 7.4 4.2 12 4.2s8.4 3.3 9.6 7.8C20.4 16.5 16.6 19.8 12 19.8S3.6 16.5 2.4 12z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            }
            @if (showConfirmPassword()) {
              <svg viewBox="0 0 24 24">
                <path d="M10.6 10.7a2.1 2.1 0 0 0 2.7 2.7" />
                <path d="M8.4 5.4A10.8 10.8 0 0 1 12 4.8c5 0 8.2 4.4 9.2 6.2a1.9 1.9 0 0 1 0 2c-.4.7-1.3 2-2.6 3.2" />
                <path d="M15.6 18.6a10.6 10.6 0 0 1-3.6.6c-5 0-8.2-4.4-9.2-6.2a1.9 1.9 0 0 1 0-2c.4-.8 1.6-2.4 3.2-3.7" />
                <path d="M3 3l18 18" />
              </svg>
            }
          </button>
        </label>

        <button class="restore-submit" type="submit">استعادة</button>
      </form>
    </section>

    <div class="restore-visual-panel" aria-hidden="true">
      <img src="/images/image2.png" alt="" class="restore-visual-img" />
    </div>
  </div>
</main>
