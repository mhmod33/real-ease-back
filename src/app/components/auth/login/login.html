<main class="auth-page" dir="rtl">
  <img class="auth-logo" src="/images/logo1.png" alt="RealEase" />

  <section class="auth-panel login-panel" aria-labelledby="login-title">
    <h1 id="login-title">أهلاً بعودتك مجددا! <span aria-hidden="true">👋</span></h1>
    <p class="auth-subtitle">من فضلك أدخل بياناتك، لنكمل الرحلة!</p>

    <form class="auth-form">
      <label class="auth-field" aria-label="البريد الالكتروني">
        <input type="email" placeholder="البريد الالكتروني" autocomplete="email" />
        <span class="field-icon field-icon-right" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M4 6.5h16v11H4z" />
            <path d="m4.5 7 7.5 6 7.5-6" />
          </svg>
        </span>
      </label>

      <label class="auth-field" aria-label="كلمة المرور">
        <input type="password" placeholder="كلمة المرور" autocomplete="current-password" />
        <span class="field-icon field-icon-right" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <rect x="5.5" y="10" width="13" height="10" rx="2" />
            <path d="M8.5 10V7.5a3.5 3.5 0 0 1 7 0V10" />
          </svg>
        </span>
        <span class="field-icon field-icon-left" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M10.6 10.7a2.1 2.1 0 0 0 2.7 2.7" />
            <path d="M8.4 5.4A10.8 10.8 0 0 1 12 4.8c5 0 8.2 4.4 9.2 6.2a1.9 1.9 0 0 1 0 2c-.4.7-1.3 2-2.6 3.2" />
            <path d="M15.6 18.6a10.6 10.6 0 0 1-3.6.6c-5 0-8.2-4.4-9.2-6.2a1.9 1.9 0 0 1 0-2c.4-.8 1.6-2.4 3.2-3.7" />
            <path d="M3 3l18 18" />
          </svg>
        </span>
      </label>

      <a class="forgot-link" href="/forget-password">هل نسيت كلمة المرور؟</a>
      <button class="auth-submit" type="submit">تسجيل الدخول</button>
    </form>
  </section>

  <img
    class="auth-visual login-visual"
    src="/images/image1.png"
    alt=""
    aria-hidden="true"
  />
</main>
