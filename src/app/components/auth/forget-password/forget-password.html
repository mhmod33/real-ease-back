<main class="forgot-page" dir="rtl">
  <div class="forgot-card">
    <img class="forgot-logo" src="/images/logo1.png" alt="RealEase" />

    <section class="forgot-form-panel" aria-labelledby="forgot-title">
      <div class="header">
        <h1 id="forgot-title">نسيت كلمة المرور</h1>
      </div>

      <form class="forgot-form">
        <label class="form-field" aria-label="البريد الالكتروني">
          <input type="email" placeholder="البريد الالكتروني" autocomplete="email" />
          <span class="field-icon field-icon-right" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M4 6.5h16v11H4z" />
              <path d="m4.5 7 7.5 6 7.5-6" />
            </svg>
          </span>
        </label>

        <button class="forgot-submit" type="submit">تسجيل الدخول</button>
      </form>
    </section>

    <div class="forgot-visual-panel" aria-hidden="true">
      <img src="/images/image2.png" alt="" class="forgot-visual-img" />
    </div>
  </div>
</main>
