<!-- ── Reusable Confirmation / Info Modal ── -->
@if (open) {
  <div class="modal-overlay" (click)="onCancel()">
    <div class="modal-box" (click)="$event.stopPropagation()" dir="rtl">

      <!-- Icon -->
      <div class="modal-warning-icon" [class.modal-info-icon]="variant === 'info'">
        @if (variant === 'info') {
          <svg viewBox="0 0 24 24" fill="none" stroke="#1e3656" stroke-width="2" width="40" height="40">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="16" x2="12" y2="12"/>
            <line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
        } @else {
          <svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" width="40" height="40">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        }
      </div>

      @if (title) {
        <h3 class="modal-title">{{ title }}</h3>
      }
      @if (message) {
        <p class="modal-desc">{{ message }}</p>
      }

      @if (variant === 'info') {
        <div class="modal-actions modal-actions-single">
          <button class="btn-modal-confirm" (click)="onConfirm()">{{ confirmText }}</button>
        </div>
      } @else {
        <div class="modal-actions">
          <button class="btn-modal-cancel" (click)="onCancel()">{{ cancelText }}</button>
          <button class="btn-modal-confirm" (click)="onConfirm()">{{ confirmText }}</button>
        </div>
      }

    </div>
  </div>
}
