<!-- ═══════════════════════════════════════════════════
     REUSABLE CHAT MODAL
════════════════════════════════════════════════════ -->
@if (open && contact) {
  <div class="modal-backdrop" (click)="close()">
    <div class="chat-modal" (click)="$event.stopPropagation()" dir="rtl">

      <!-- Modal Header -->
      <div class="chat-modal-header">
        <div class="chat-modal-user-info">
          <div class="chat-modal-avatar">
            <img [src]="contact.image" [alt]="contact.name" />
          </div>
          <div class="chat-modal-meta">
            <span class="chat-modal-name">{{ contact.name }}</span>
            @if (contact.role) {
              <span class="chat-modal-role">{{ contact.role }}</span>
            }
            <span class="chat-modal-online">
              <span class="online-dot"></span>
              متصل الآن
            </span>
          </div>
        </div>

        <div class="chat-modal-header-actions">
          <!-- Phone -->
          <button class="chat-action-btn" title="اتصال">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.21h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6.29 6.29l.91-.91a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
          </button>

          <!-- Video -->
          <button class="chat-action-btn" title="مكالمة فيديو">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <polygon points="23 7 16 12 23 17 23 7"/>
              <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
            </svg>
          </button>

          <!-- Close -->
          <button class="chat-close-btn" (click)="close()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Date Divider -->
      <div class="chat-date-divider">
        <span>اليوم</span>
      </div>

      <!-- Messages Area -->
      <div class="chat-messages-area">
        @for (msg of history; track msg.id) {
          <div class="chat-msg-row" [class.chat-msg-me]="msg.isMe">
            @if (!msg.isMe) {
              <div class="chat-avatar-sm">
                <img [src]="contact.image" [alt]="contact.name" />
              </div>
            }
            <div class="chat-bubble-col">
              <div class="chat-bubble" [class.chat-bubble-me]="msg.isMe">
                {{ msg.text }}
              </div>
              <span class="chat-msg-time">{{ msg.time }}</span>
            </div>
          </div>
        }
      </div>

      <!-- Input Bar -->
      <div class="chat-input-bar">
        <!-- Attachment -->
        <button class="chat-attach-btn" title="إرفاق ملف">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>

        <input
          class="chat-modal-input"
          type="text"
          [(ngModel)]="newMessage"
          (keydown)="onEnter($event)"
          placeholder="اكتب رسالتك هنا..."
        />

        <!-- Emoji -->
        <button class="chat-attach-btn" title="إيموجي">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <circle cx="12" cy="12" r="10"/>
            <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
            <line x1="9" y1="9" x2="9.01" y2="9"/>
            <line x1="15" y1="9" x2="15.01" y2="9"/>
          </svg>
        </button>

        <!-- Send -->
        <button class="chat-send-btn" (click)="send()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>

    </div>
  </div>
}
