<header class="header" dir="rtl">
  <button
    type="button"
    class="header__menu-btn"
    (click)="sidebarService.toggle()"
    aria-label="فتح القائمة الرئيسية"
  >
    <svg viewBox="0 0 24 24">
      <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
    </svg>
  </button>

  <div class="header__search">
    <input
      class="header__search-input"
      type="search"
      placeholder="البحث هنا"
      aria-label="البحث هنا"
    />
    <span class="header__search-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="6.5" />
        <path d="M16.5 16.5L21 21" />
      </svg>
    </span>
  </div>

  <div class="header__actions">
    <button type="button" class="header__lang" aria-label="تغيير اللغة">
      <span class="header__lang-flag" aria-hidden="true"></span>
      <span class="header__lang-text">العربية</span>
      <svg class="header__chevron" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M6 9l6 6 6-6" />
      </svg>
    </button>

    <button type="button" class="header__notification" aria-label="الإشعارات">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 3a5 5 0 0 1 5 5v3.5l1.5 2.5H5.5L7 11.5V8a5 5 0 0 1 5-5z" />
        <path d="M10 18.5a2 2 0 0 0 4 0" />
      </svg>
      <span class="header__notification-dot" aria-hidden="true"></span>
    </button>

    <button type="button" class="header__profile" aria-label="قائمة المستخدم">
      <span class="header__avatar" aria-hidden="true">م</span>

      <span class="header__user-info">
        <span class="header__user-name">{{ userName }}</span>
        <span class="header__user-role">{{ userRole }}</span>
      </span>

      <svg class="header__chevron" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M6 9l6 6 6-6" />
      </svg>
    </button>
  </div>
</header>
