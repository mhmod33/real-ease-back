<aside class="sidebar" [class.sidebar--collapsed]="collapsed()" dir="rtl">
  <div class="sidebar__header">
    <img
      class="sidebar__logo"
      src="/images/logo2.png"
      alt="RealEase"
    />

    <button
      type="button"
      class="sidebar__collapse-btn"
      (click)="toggleCollapse()"
      [attr.aria-label]="collapsed() ? 'توسيع القائمة' : 'طي القائمة'"
      [attr.aria-expanded]="!collapsed()"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M9 6l6 6-6 6" />
      </svg>
    </button>
  </div>

  <div class="sidebar__header-divider" aria-hidden="true"></div>

  <nav class="sidebar__nav" aria-label="القائمة الرئيسية">
    @for (item of navItems; track item.route) {
      <a
        class="sidebar__nav-link"
        [routerLink]="item.route"
        routerLinkActive="sidebar__nav-link--active"
        [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
      >
        <span class="sidebar__nav-icon" aria-hidden="true">
          @switch (item.icon) {
            @case ('dashboard') {
              <svg viewBox="0 0 24 24">
                <rect x="3" y="3" width="7" height="7" rx="1.5" />
                <rect x="14" y="3" width="7" height="7" rx="1.5" />
                <rect x="3" y="14" width="7" height="7" rx="1.5" />
                <rect x="14" y="14" width="7" height="7" rx="1.5" />
              </svg>
            }
            @case ('properties') {
              <svg viewBox="0 0 24 24">
                <path d="M4 20V9l8-5 8 5v11" />
                <path d="M9 20v-6h6v6" />
                <path d="M9 12h6" />
              </svg>
            }
            @case ('orders') {
              <svg viewBox="0 0 24 24">
                <path d="M7 4h10v16H7z" />
                <path d="M10 8h4" />
                <path d="M10 12h4" />
                <path d="M10 16h4" />
              </svg>
            }
            @case ('agents') {
              <svg viewBox="0 0 24 24">
                <circle cx="12" cy="8" r="3.5" />
                <path d="M5 20c0-3.5 3.1-6 7-6s7 2.5 7 6" />
              </svg>
            }
            @case ('users') {
              <svg viewBox="0 0 24 24">
                <circle cx="9" cy="9" r="2.5" />
                <circle cx="16" cy="10" r="2" />
                <path d="M4 19c0-2.8 2.2-5 5-5" />
                <path d="M13 19c0-2.2 1.8-4 4-4" />
              </svg>
            }
          }
        </span>
        <span class="sidebar__nav-label">{{ item.label }}</span>
      </a>
    }
  </nav>

  <div class="sidebar__divider" aria-hidden="true"></div>

  <div class="sidebar__footer">
    <a class="sidebar__nav-link" routerLink="/settings">
      <span class="sidebar__nav-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3" />
          <path d="M12 2v2" />
          <path d="M12 20v2" />
          <path d="M4.9 4.9l1.4 1.4" />
          <path d="M17.7 17.7l1.4 1.4" />
          <path d="M2 12h2" />
          <path d="M20 12h2" />
          <path d="M4.9 19.1l1.4-1.4" />
          <path d="M17.7 6.3l1.4-1.4" />
        </svg>
      </span>
      <span class="sidebar__nav-label">الاعدادات</span>
    </a>

    <button type="button" class="sidebar__logout">
      <span class="sidebar__nav-icon sidebar__nav-icon--logout" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M10 4H5v16h5" />
          <path d="M14 12H7" />
          <path d="M18 8l4 4-4 4" />
        </svg>
      </span>
      <span class="sidebar__nav-label">تسجيل الخروج</span>
    </button>
  </div>

  <div class="sidebar__promo">
    <div class="sidebar__promo-bg" aria-hidden="true"></div>

    <div class="sidebar__promo-content">
      <img
        class="sidebar__promo-logo"
        src="/images/logo white 1.png"
        alt=""
        aria-hidden="true"
      />

      <p class="sidebar__promo-text">
        <span>الحصول علي كل المزايا</span>
        <span>والتحكم الكامل في العملاء</span>
      </p>

      <button type="button" class="sidebar__promo-btn">تجربة مجانية</button>
    </div>
  </div>
</aside>
